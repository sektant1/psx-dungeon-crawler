# Static set-dressing for the lobby (depth 0). Each [[prop]] is one node with a
# single yaw and uniform/simple scale; 1..N mesh/material parts share it.
#
# Migrated from game/src/main.cpp buildLevel(). NOT here (kept in code because
# the flat schema can't express them): the table's bread/pumpkin children, the
# vault sword+shield (compound rotations, tiny scale), the stacked crates
# (per-crate Y offsets), and the braziers (particles + light repositioning).

# --- entry hall (z ~ +24): a market table greets the player.
[[prop]]
meshes = ["prop_table_p0.obj", "prop_table_p1.obj"]
materials = ["Game/PropWood", "Game/PropMarket"]
position = [7.0, 0.88, 24.5]
yaw = -120.0
cast_shadows = false

