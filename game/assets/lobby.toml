# The open centre preserves a strong spawn -> shrine -> portal sightline.
# Curated prop markers form readable exhibit bays along the walls, while the
# runtime showcase supplies the animated chest, crystals, particles, graded
# fog, shadow-casting fire, weapon display, market table, and stacked clutter.
# Edit this file in the standalone level editor (`make editor`).

