# Data-driven feature gallery for The Reliquary lobby.
# Coordinate convention: +Z is the arrival end, -Z is the dungeon portal.
# Exhibits stay in the side aisles, preserving a 6 m-wide golden path.

# Animated liquid study — four raised side bays near the arrival half.
