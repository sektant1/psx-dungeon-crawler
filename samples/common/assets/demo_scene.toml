# Shared PSX demo scene (from MenacingMecha's godot-psx-style-demo).
# Colours tagged _srgb are linearised (pow 2.2) at load; energies are
# multiplied after, matching Godot's linear-space shading.

[env]
ambient_srgb = [1.0, 0.67451, 0.988235]
ambient_energy = 0.15
fog_srgb = [0.670588, 0.760784, 1.0]
fog_density = 0.05
background_srgb = [0.670588, 0.760784, 1.0]
dither = true

[sun]
position = [5.08833, 2.79045, -0.311581]
basis_rows = [0.999229, -0.0247207, 0.0305003, 0.0, 0.776871, 0.629659, -0.0392604, -0.629174, 0.776272]
colour = [1.5, 1.5, 1.5] # light_energy 1.5, white

[omni]
x_positions = [-4.0, 4.0]
y = 0.784
colour_srgb = [0.909804, 0.803922, 0.666667]
energy = 4.75
range = 3.0

[light_shaft]
mesh = "light_shaft.obj"
material = "PSX/LightShaft"
position = [0.0109267, 2.05731, 0.0147681]

[boxes]
y = 2.236
scale = 0.613118
metal_x = -1.0
lit_x = 1.0
metal_mesh = "bevel-box.obj"
lit_mesh = "box.obj"
metal_material = "PSX/BoxMetal"
lit_material = "PSX/BoxLit"
sparkles = "PSX/Sparkles"

[shadows]
plane_size = 2.0
y = 0.05
material = "PSX/Shadow"

[crystals]
ground_mesh = "crystal_ground.obj"
ground_material = "PSX/CrystalGround"
ground_offset = [-0.02274385, 0.0, 0.01232092]
ground_scale = 0.31058314
spire_material = "PSX/CrystalSpire"

# Spire transforms (rotation * non-uniform scale) baked into vertices.
# Either quat+scale or a raw 3x3 given as rows (tscn Transform3D order).
[[crystals.spire]]
